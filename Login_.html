<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RoomBooking.com</title>
  <link rel="stylesheet" href="Style.css">
  <style>
    body.page-login {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      background: linear-gradient(160deg, var(--teal-deep) 0%, var(--navy) 50%, #07101e 100%);
      position: relative;
      overflow: hidden;
    }

    .login-wrap::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(0,180,180,0.12);
      pointer-events: none;
      animation: bgRing 6s ease-in-out infinite alternate;
    }
    .login-wrap::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 1000px; height: 1000px;
      border-radius: 50%;
      border: 1px solid rgba(201,153,58,0.07);
      pointer-events: none;
    }
    @keyframes bgRing {
      from { transform: translate(-50%,-50%) scale(0.95); }
      to   { transform: translate(-50%,-50%) scale(1.05); }
    }

    .login-card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      animation: cardRise 0.7s cubic-bezier(0.16,1,0.3,1) 4.1s both;
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(0,180,180,0.3);
    }

    .login-card h2 {
      font-family: var(--font-display);
      font-size: 1.9rem;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .login-card > p {
      color: var(--stone);
      font-size: 0.92rem;
      margin-bottom: 32px;
    }

    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 24px;
    }

    .login-error {
      display: none;
      background: #fff0f0;
      border: 1.5px solid #f5c0c0;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.87rem;
      margin-bottom: 16px;
    }

    .login-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(0,180,180,0.35);
    }
    .login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0,180,180,0.45);
    }

    .login-divider {
      text-align: center;
      color: var(--stone);
      font-size: 0.82rem;
      margin: 20px 0;
      position: relative;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%;
      height: 1px;
      background: var(--sand);
    }
    .login-divider::before { left: 0; }
    .login-divider::after  { right: 0; }

    .login-signup-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--sand);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
      display: block;
      text-decoration: none;
      box-sizing: border-box;
    }
    .login-signup-btn:hover {
      border-color: var(--teal);
      background: rgba(0,180,180,0.04);
    }

    @media (max-width: 500px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body class="page-login">

  <!-- ═══ SPLASH SCREEN ═══ -->
  <div id="splash" role="presentation" aria-hidden="true">
    <div class="splash-ring"></div>
    <div class="splash-content">
      <div class="splash-icon">🏨</div>
      <div class="splash-title">Room<span>Booking</span></div>
      <div class="splash-tagline">Coastal Comfort, Seamlessly Yours</div>
      <div class="splash-bar"></div>
    </div>
  </div>

  <!-- ═══ LOGIN FORM ═══ -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-card-icon">🏨</div>
      <div class="section-label">Welcome back</div>
      <h2>Sign In</h2>
      <p>Access your account to manage bookings and discover exclusive offers.</p>

      <div class="login-error" id="loginError">Please enter both your username and password.</div>

      <div class="login-fields">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="your.username" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="login-submit" id="loginBtn" type="button">Sign In →</button>
      </div>

      <div class="login-divider">or</div>
      <a href="Register.html" class="login-signup-btn">Create a Free Account</a>
    </div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="About_Us.html">About</a>
      <a href="Contact_Us.html">Contact</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms</a>
    </div>
    <p>&copy; 2026 <strong>RoomBooking.com</strong> — All rights reserved.</p>
  </footer>

  <script>
    // If already logged in, skip straight to home
    if (localStorage.getItem('rb_logged_in') === 'true') {
      window.location.href = 'Index.html';
    }

    function doLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value.trim();
      var errorBox = document.getElementById('loginError');

      if (!username || !password) {
        errorBox.textContent = 'Please enter both your username and password.';
        errorBox.style.display = 'block';
        return;
      }

      // Store session flag
      localStorage.setItem('rb_logged_in', 'true');
      localStorage.setItem('rb_user', username);

      // Go to home
      window.location.href = 'Index.html';
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);

    document.getElementById('username').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>

</body>
</html>
